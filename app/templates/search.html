<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suchergebnisse</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }
        header {
            background-color: #0066cc;
            color: #fff;
            padding: 10px;
            text-align: center;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #004c99;
            color: #fff;
        }
        .navbar a {
            color: #fff;
            text-decoration: none;
            font-size: 1.2em;
        }
        .navbar a:hover {
            text-decoration: underline;
        }
        .search-form {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .search-form input {
            padding: 5px;
            width: 300px;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
        .search-form button {
            padding: 5px 10px;
            background-color: #0066cc;
            color: #fff;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        .search-form button:hover {
            background-color: #004c99;
        }
        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 10px;
        }
        .results-box {
            background: #fff;
            margin-bottom: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            padding: 10px;
        }
        .results-box h2 {
            margin: 0;
            font-size: 1.5em;
            color: #0066cc;
        }
        .entry {
            margin-bottom: 10px;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        .entry:last-child {
            border-bottom: none;
        }
        .entry a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }
        .entry a:hover {
            color: #0066cc;
        }
        .entry .published-date {
            font-size: 0.9em;
            color: #555;
            margin-top: 5px;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #004c99;
            color: #fff;
        }
        .navbar a {
            color: #fff;
            text-decoration: none;
            font-size: 1.2em;
        }
        .navbar a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <h1>Suchergebnisse</h1>
    </header>
    <nav class="navbar">
        <a href="/">← Zur Startseite</a>
        <a href="/reports">Berichte</a>
        <form action="/search" method="get" class="search-form">
            <input 
                type="text" 
                name="q" 
                placeholder="Suche nach CVE, Technologien, etc." 
                value="{{ query }}">
            <button type="submit">Suchen</button>
        </form>
    </nav>
    <div class="container">
        {% if results %}
        {% for source, entries in results.items() %}
        <div class="results-box">
            <h2>{{ source }}</h2>
            {% for entry in entries %}
            <div class="entry">
                <a href="{{ entry.link }}" target="_blank">{{ entry.title }}</a>
                <div class="published-date">Published: {{ entry.published }}</div>
            </div>
            {% endfor %}
        </div>
        {% endfor %}
        {% else %}
        <p>Keine Ergebnisse für "{{ query }}" gefunden.</p>
        {% endif %}
    </div>
</body>
</html>
